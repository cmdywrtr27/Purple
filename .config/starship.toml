format = """
[](fg:#6d597a bg:#212837)\
$status\
${custom.icon}\
[](fg:#6d597a bg:#3d5a80)\
$directory\
[](fg:#3d5a80 bg:#f4a259)\
$time\
[](fg:#f4a259 bg:#5b8e7d)\
$cmd_duration\
[](fg:#5b8e7d bg:#bc4b51)\
$git_branch\
$git_status\
[ ](fg:#bc4b51)\
"""

[status]
style = "fg:#ffffff bg:#6d597a"
symbol = ""
success_symbol = ""
format = '[ $symbol ]($style)'
map_symbol = false
disabled = false

[username]
show_always = false
style_user = "bg:#6d597a"
style_root = "bg:#6d597a"
format = '[$user]($style)'

[hostname]
ssh_only = false
format = "[@$hostname ](bg:#6d597a)"
trim_at = "."
disabled = true

[custom.arch]
description = "Display arch logo"
when = "true"
style = "fg:#ffffff bg:#6d597a"
format = '[$symbol(bg:#6d597a)]($style) '
symbol = " "

[custom.icon]
description = "Display icon for each home folder"
command = """
if [ "$PWD" = "$HOME" ]; then
    echo ""
elif [ "$PWD" = "$HOME/Documents" ]; then
    echo ""
elif [ "$PWD" = "$HOME/Downloads" ]; then
    echo "ﰬ"
elif [ "$PWD" = "$HOME/Music" ]; then
    echo ""
elif [ "$PWD" = "$HOME/Pictures" ]; then
    echo ""
elif [ "$PWD" = "$HOME/Videos" ]; then
    echo ""
else
    echo "ﱮ"
fi
"""
when = "true"
style = "fg:#ffffff bg:#6d597a"
format = '[ $output ]($style)'

[directory]
style = "fg:#ffffff bg:#3d5a80"
format = '[ $path ]($style)'
truncation_length = 2
truncation_symbol = "~/"

[git_branch]
symbol = " "
style = "fg:#ffffff bg:#bc4b51"
format = '[ $symbol $branch]($style)'

[git_status]
style = "fg:#ffffff bg:#bc4b51"
format = '[ ($all_status) ]($style)'

[custom.docker]
description = "Shows the docker symbol if the current directory has Dockerfile or docker-compose.yml files"
style = "bg:#86BBD8"
format = '[$symbol]($style)'
symbol = " 🐳 "
files = ["Dockerfile", "docker-compose.yml", "docker-compose.yaml"]
when = """ command -v docker &> /dev/null; exit (echo $?); """
disabled = true

[cmd_duration]
min_time = 500
style = "fg:#ffffff bg:#5b8e7d"
format = "[ 󰔛 $duration ]($style)"
disabled = true

[time]
disabled = true
time_format = "%l:%M %P"
style = "fg:#ffffff bg:#f4a259"
format = '[ $time ]($style)'
